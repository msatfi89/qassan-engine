name: qassan-engine
on:
  schedule:
    # Every 2 hours. At ~3 min/run, every-30-min works out to ~4,300 GitHub
    # Actions minutes/month against a 2,000 free allowance on a private repo;
    # this lands near 1,100. STEG publishes next-day notices, so 2h still
    # catches announcements well ahead of the outage. Restore "*/30 * * * *"
    # if the repo goes public (public repos get unlimited minutes).
    - cron: "0 */2 * * *"
  workflow_dispatch: {}       # manual "Run workflow" button for testing

jobs:
  collect-and-parse:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r collector/requirements.txt
      - name: Collect announcements
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python collector/collector.py
      - name: Parse new documents
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python collector/parser.py
