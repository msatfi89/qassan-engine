name: qassan-engine
on:
  schedule:
    # Tunisia is UTC+1, so 06:00-23:00 local = 05:00-22:00 UTC.
    #
    # Dense during announcement hours, sparse overnight:
    #   every 30 min, 05:00-21:30 UTC  (34 runs)
    #   05:00 boundary run and a 22:00 run for the 23:00 local edge
    #   every 2 h overnight              (a few runs)
    # ~38 runs/day at ~4 min each ≈ 4,600 Actions minutes/month.
    #
    # BUDGET: that is ~2.3x the 2,000-minute free allowance on a PRIVATE repo.
    # A public repo gets UNLIMITED Actions minutes, and this repo commits no
    # secrets (they live in GitHub Secrets, .env is gitignored), so making it
    # public is the intended way to afford this cadence. Until then, dial the
    # active window back to hourly ("0 5-22 * * *") to stay near ~1,500/month.
    - cron: "*/30 5-21 * * *"
    - cron: "0 22 * * *"
    - cron: "0 23,1,3 * * *"
  workflow_dispatch: {}       # manual "Run workflow" button for testing

jobs:
  collect-and-parse:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r collector/requirements.txt
      - name: Collect announcements
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python collector/collector.py
      - name: Parse new documents
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python collector/parser.py
