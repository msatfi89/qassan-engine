name: qassan-retrolink

# Free to run: re-matches extractions already stored in
# raw_documents.parsed_json against the registry as it stands now. No Claude
# calls, no new documents, no events created or deleted. Worth running after
# every registry change.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Report what would change without writing anything"
        type: boolean
        required: false
        default: true

jobs:
  retrolink:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r collector/requirements.txt

      - name: Re-link (dry run)
        if: ${{ inputs.dry_run }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python collector/retrolink.py --dry-run

      - name: Re-link and apply
        if: ${{ !inputs.dry_run }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python collector/retrolink.py
