name: qassan-backfill

# Manual only — never on a schedule. Each run costs real Claude credits and
# crawls a few hundred archive pages, so it is triggered deliberately, one
# month at a time, from the Actions tab.
on:
  workflow_dispatch:
    inputs:
      month:
        description: "YYYY-MM, or a range YYYY-MM:YYYY-MM (e.g. 2023-01:2023-12)"
        required: true
        default: "2025-07"
      dry_run:
        description: "Count candidates only — no downloads, no writes, no Claude calls"
        type: boolean
        required: false
        default: true

jobs:
  backfill:
    runs-on: ubuntu-latest
    # July 2025 measured at 8m44s end to end, so a 12-month range needs ~1h45m.
    # Generous headroom for busier years; still under GitHub's 6-hour ceiling.
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r collector/requirements.txt

      - name: Crawl archives (dry run)
        if: ${{ inputs.dry_run }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python collector/backfill.py "${{ inputs.month }}" --dry-run

      - name: Crawl archives and store documents
        if: ${{ !inputs.dry_run }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python collector/backfill.py "${{ inputs.month }}"

      # --all drains the queue instead of stopping at one 25-document batch,
      # and reports exact token usage and dollar cost when it finishes.
      - name: Parse backfilled documents
        if: ${{ !inputs.dry_run }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python collector/parser.py --all

      # Free: re-matches stored extractions against the registry as it stands
      # now, picking up links that were missed when it was smaller. No Claude
      # calls.
      - name: Re-link against the current registry
        if: ${{ !inputs.dry_run }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python collector/retrolink.py
